name: test and release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true

    - name: Install dependencies
      run: go mod tidy

    - name: Run tests
      run: |
        find . -name "*_test.go" | xargs -n 1 dirname | sort -u | xargs go test -v | tee test-results.txt
    - name: Run benchmark
      run: |
        find . -name "*_test.go" | xargs -n 1 dirname | sort -u | xargs go test -bench=. -v -run="^(Benchmark)" | tee benchmark-results.txt
    - name: Save test results as summary
      if: success() || failure()
      run: |
        echo "### Test Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat test-results.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    - name: Save benchmark results as summary
      if: success() || failure()
      run: |
        echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: true

    - name: Install dependencies
      run: go mod tidy

    - name: build
      run: go build -o btree main.go

    - name: Create release
      uses: softprops/action-gh-release@v3
      with:
        files: btree
        name: btree
        tag_name: release
        make_latest: true